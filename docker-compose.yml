version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: main_db
    ports:
      - "5432:5432"
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
  app:
    build: .
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/main_db
      RABBITMQ_URL: amqp://rabbitmq:5672
    ports:
      - "3000:3000"